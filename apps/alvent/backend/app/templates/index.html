
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>POS Artesanía</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container-fluid p-3">
  <h2>POS Artesanía Textil</h2>
  <div class="row">
    <div class="col-md-8">
      <div class="row">
      {% for p in productos %}
        <div class="col-sm-6 col-lg-4 mb-3">
          <div class="card">
            <div class="card-body">
              <h5>{{p.nombre}}</h5>
              <p>Código: {{p.codigo}}</p>
              <p>S/ {{p.precio}}</p>
              <button class="btn btn-primary" onclick="agregar('{{p.nombre}}', {{p.precio}})">Agregar</button>
            </div>
          </div>
        </div>
      {% endfor %}
      </div>
    </div>
    <div class="col-md-4">
      <div class="card">
        <div class="card-header">Carrito</div>
        <div class="card-body">
          <ul id="carrito"></ul>
          <h4>Total: S/ <span id="total">0</span></h4>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
let total=0;
function agregar(nombre, precio){
  const li=document.createElement('li');
  li.textContent=nombre + ' - S/ ' + precio;
  document.getElementById('carrito').appendChild(li);
  total += precio;
  document.getElementById('total').textContent=total;
}
</script>
</body>
</html>
