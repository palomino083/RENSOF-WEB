<svg width="1400" height="840" viewBox="0 0 1400 840" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Panel tecnologico futurista RENSOF</title>
  <desc id="desc">Ilustracion futurista con tablero de datos, graficos y red digital para la plataforma RENSOF.</desc>
  <defs>
    <linearGradient id="bg" x1="92" y1="80" x2="1310" y2="780" gradientUnits="userSpaceOnUse">
      <stop stop-color="#071B2F"/>
      <stop offset="0.5" stop-color="#0A2B49"/>
      <stop offset="1" stop-color="#03111F"/>
    </linearGradient>
    <radialGradient id="haloA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(345 210) rotate(34.5) scale(390 260)">
      <stop stop-color="#00C3D7" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#00C3D7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="haloB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1020 170) rotate(164) scale(320 230)">
      <stop stop-color="#34D27F" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#34D27F" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="220" y1="140" x2="1160" y2="710" gradientUnits="userSpaceOnUse">
      <stop stop-color="#031A2D"/>
      <stop offset="1" stop-color="#071524"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0C3254" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#072039" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#00C3D7"/>
      <stop offset="1" stop-color="#34D27F"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1400" height="840" rx="34" fill="url(#bg)"/>
  <rect width="1400" height="840" rx="34" fill="url(#haloA)"/>
  <rect width="1400" height="840" rx="34" fill="url(#haloB)"/>

  <g opacity="0.2">
    <path d="M80 146H1320" stroke="#7BCDF4" stroke-width="1"/>
    <path d="M80 226H1320" stroke="#7BCDF4" stroke-width="1"/>
    <path d="M80 306H1320" stroke="#7BCDF4" stroke-width="1"/>
    <path d="M80 386H1320" stroke="#7BCDF4" stroke-width="1"/>
    <path d="M80 466H1320" stroke="#7BCDF4" stroke-width="1"/>
    <path d="M80 546H1320" stroke="#7BCDF4" stroke-width="1"/>
    <path d="M80 626H1320" stroke="#7BCDF4" stroke-width="1"/>
    <path d="M80 706H1320" stroke="#7BCDF4" stroke-width="1"/>
    <path d="M180 90V750" stroke="#7BCDF4" stroke-width="1"/>
    <path d="M320 90V750" stroke="#7BCDF4" stroke-width="1"/>
    <path d="M460 90V750" stroke="#7BCDF4" stroke-width="1"/>
    <path d="M600 90V750" stroke="#7BCDF4" stroke-width="1"/>
    <path d="M740 90V750" stroke="#7BCDF4" stroke-width="1"/>
    <path d="M880 90V750" stroke="#7BCDF4" stroke-width="1"/>
    <path d="M1020 90V750" stroke="#7BCDF4" stroke-width="1"/>
    <path d="M1160 90V750" stroke="#7BCDF4" stroke-width="1"/>
  </g>

  <rect x="155" y="108" width="1090" height="622" rx="24" fill="url(#panel)" stroke="#1B4D77" stroke-width="2"/>

  <rect x="190" y="152" width="322" height="146" rx="16" fill="url(#card)" stroke="#1F5E92"/>
  <text x="214" y="184" fill="#A8CEE9" font-family="Segoe UI, Arial, sans-serif" font-size="18">Rentabilidad</text>
  <text x="214" y="242" fill="#EAF7FF" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="700">24.8%</text>
  <text x="214" y="272" fill="#34D27F" font-family="Segoe UI, Arial, sans-serif" font-size="18">+12.6% vs mes anterior</text>

  <rect x="538" y="152" width="322" height="146" rx="16" fill="url(#card)" stroke="#1F5E92"/>
  <text x="562" y="184" fill="#A8CEE9" font-family="Segoe UI, Arial, sans-serif" font-size="18">Valor generado</text>
  <text x="562" y="242" fill="#EAF7FF" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="700">$ 1.25M</text>
  <text x="562" y="272" fill="#34D27F" font-family="Segoe UI, Arial, sans-serif" font-size="18">+8.7% proyeccion trimestral</text>

  <rect x="886" y="152" width="322" height="146" rx="16" fill="url(#card)" stroke="#1F5E92"/>
  <text x="910" y="184" fill="#A8CEE9" font-family="Segoe UI, Arial, sans-serif" font-size="18">TIR estimada</text>
  <text x="910" y="242" fill="#EAF7FF" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="700">18.6%</text>
  <text x="910" y="272" fill="#34D27F" font-family="Segoe UI, Arial, sans-serif" font-size="18">+2.1% mejora anual</text>

  <rect x="190" y="328" width="670" height="366" rx="16" fill="#071C31" stroke="#1F5E92"/>
  <text x="214" y="362" fill="#A8CEE9" font-family="Segoe UI, Arial, sans-serif" font-size="18">Flujo de decisiones proyectado</text>

  <path d="M230 620L300 575L360 598L430 520L500 545L560 470L640 505L710 430L790 458" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <circle cx="300" cy="575" r="6" fill="#00C3D7"/>
  <circle cx="430" cy="520" r="6" fill="#00C3D7"/>
  <circle cx="560" cy="470" r="6" fill="#34D27F"/>
  <circle cx="710" cy="430" r="6" fill="#34D27F"/>

  <rect x="886" y="328" width="322" height="366" rx="16" fill="#071C31" stroke="#1F5E92"/>
  <text x="910" y="362" fill="#A8CEE9" font-family="Segoe UI, Arial, sans-serif" font-size="18">Distribucion de inversiones</text>
  <circle cx="1048" cy="520" r="110" stroke="#123B60" stroke-width="36"/>
  <path d="M1048 410A110 110 0 0 1 1143 466" stroke="#00C3D7" stroke-width="36" fill="none" stroke-linecap="round"/>
  <path d="M1143 466A110 110 0 0 1 1060 629" stroke="#34D27F" stroke-width="36" fill="none" stroke-linecap="round"/>
  <path d="M1060 629A110 110 0 0 1 952 447" stroke="#F4A63D" stroke-width="36" fill="none" stroke-linecap="round"/>

  <g opacity="0.85">
    <rect x="220" y="88" width="74" height="32" rx="9" fill="#00C3D7" fill-opacity="0.2" stroke="#2DCFE0"/>
    <text x="238" y="110" fill="#CCF3FF" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">RENSOF</text>
    <circle cx="1170" cy="104" r="5" fill="#34D27F"/>
    <circle cx="1194" cy="104" r="5" fill="#00C3D7"/>
    <circle cx="1218" cy="104" r="5" fill="#F4A63D"/>
  </g>
</svg>
