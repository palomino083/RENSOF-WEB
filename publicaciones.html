


<main class="page-main" style="padding-top: 84px;">
  <section class="story-block">
    <div class="r2030-grid reveal">
      <span class="story-kicker">Publicaciones</span>
      <h1 class="story-title" style="font-size:clamp(1.9rem,4.8vw,3.4rem)">Centro de conocimiento estratégico</h1>
      <p class="story-text">Investigación aplicada, notas técnicas y visualizaciones para directivos y equipos especializados.</p>

      <form method="get" action="/publicaciones" class="contact-panel" style="margin-top:18px; padding:16px;">
        <label for="q">Buscar por título, resumen, categoría, autor o etiqueta</label>
        <input id="q" class="r-input" type="text" name="q" value="" placeholder="Ejemplo: prospectiva, IA, capital natural">
        <button class="r-btn r-btn-primary" type="submit">Buscar</button>
        <a href="/publicaciones" class="r-btn r-btn-ghost" style="margin-left:8px;">Limpiar</a>
        <p style="margin-top:10px; color:var(--r-text-soft);">Resultados: </p>
      </form>

      <div class="intel-pillars" style="margin-top:20px; grid-template-columns:repeat(3,1fr);">
        
        <article class="pillar-card">
          <strong></strong>
          <span></span>
          <span style="margin-top:10px; display:block;"> | </span>
          <span style="margin-top:4px; display:block;">Estado: </span>
          <span style="margin-top:4px; display:block;">Fecha: </span>
          <span style="margin-top:4px; display:block;">Tags: </span>
          <span style="margin-top:4px; display:block;">Contacto: </span>
        </article>
        {% else %}
        <article class="pillar-card" style="grid-column:1 / -1;">
          <strong>Sin resultados</strong>
          <span>No se encontraron publicaciones para la búsqueda actual.</span>
        </article>
        
      </div>
    </div>
  </section>
</main>
