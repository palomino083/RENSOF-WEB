


<main class="page-main" style="padding-top: 84px;">
  <section class="story-block">
    <div class="r2030-grid contact-wrap reveal">
      <article class="contact-panel">
        <span class="story-kicker">Contacto</span>
        <h1 class="story-title" style="font-size:clamp(1.7rem,4.2vw,3rem)">Activa RENSOF en tu organización</h1>
        <p class="story-text">Cuantifica decisiones, conecta datos y despliega inteligencia aplicada en semanas.</p>
        <p style="margin-top:14px; color:var(--r-text-soft);"></p>
      </article>

      <form class="contact-panel" id="contactForm" action="/contacto/enviar" method="POST">
        <input type="hidden" name="redirect_to" value="/contacto">
        <input type="hidden" name="source_page" value="contacto">

        

        <label for="nombre">Nombre completo</label>
        <input id="nombre" class="r-input" type="text" name="nombre" required minlength="3">

        <label for="email">Correo</label>
        <input id="email" class="r-input" type="email" name="email" required>

        <label for="servicio">Producto de interés</label>
        <select id="servicio" class="r-select" name="servicio" required>
          <option value="">Selecciona una opción</option>
          
          <option> - </option>
          
        </select>

        <label for="canal_correo">Correo asignado</label>
        <select id="canal_correo" class="r-select" name="canal_correo" required>
          <option value="">Selecciona un correo</option>
          
          <option value=""> |  | </option>
          
        </select>

        <label for="mensaje">Mensaje</label>
        <textarea id="mensaje" class="r-textarea" name="mensaje" rows="5" required minlength="12"></textarea>

        <button class="r-btn r-btn-primary" type="submit">Enviar consulta</button>
        <p id="formNote" style="margin-top:12px; color:var(--r-text-soft);">También puedes escribir a contacto@rensof.pe.</p>
      </form>
    </div>
  </section>

  <section class="story-block mission-band">
    <div class="r2030-grid reveal">
      <span class="story-kicker">Correos de atención</span>
      <div class="intel-pillars" style="grid-template-columns:repeat(3,1fr); margin-top:16px;">
        
        <article class="pillar-card">
          <strong></strong>
          <span></span>
          <span></span>
          <span></span>
        </article>
        
      </div>
    </div>
  </section>
</main>
